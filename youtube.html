<!DOCTYPE html>
<html>
  <head>
    <title>Youtube.com Clone</title>
    <style>
      p{
        font-family: Roboto;
        margin-top:0;
      }
      .thumbnail{
        width:300px;
        display:block;
      }
      .search-bar{
        display:block;
      }
      .channel-picture{
         display:inline-block;
         width:50px;
         vertical-align: top;
      }
      .video-title{
        margin-top:0;
        font-size:14px;
        font-weight:500;
        line-height:20px;
      }
      .video-author{
        font-size:12px;
        color:rgb(96,96,96);
        margin-bottom: 0;
      }
      .video-stats{
        margin-top:5px;
        font-size:12px;
        color:rgb(96,96,96);
      }
      .video-info{
         display:inline-block;
         width:245px;
      }
      .video-preview{
        width:300px;
        display:inline-block;
        vertical-align:top;
        margin-right:20px;
      }
      .profile-picture{
        width:40px;
        border-radius:50px;
      }
      .thumbnail-row{
        margin-bottom:12px;
      }
    </style>
  </head>
  <body>
    <input class="search-bar" type = "search" placeholder="Search"> 
    <div class="video-preview">
      <div class="thumbnail-row">
        <img class="thumbnail" src="Thumbnail/thumbnail-1.webp">
      </div>
      <div>
      <div class="channel-picture">
         <img class="profile-picture" src="ChannelPicture/channel-1.jpeg">
      </div>
      <div class="video-info">
          <p class="video-title">
        Talking Tech and 
        AI with Google CEO Sundar Pichai!
        </p>
        <p class = "video-author">
         Marques Brownlee
        </p>
        <p class="video-stats">
      3.4M views &#183; 6 months ago
    </p>
      </div>
    </div>
    </div>
<div class="video-preview">
      <div class="thumbnail-row">
        <img class="thumbnail" src="Thumbnail/thumbnail-2.webp">
      </div>
      <div class="channel-picture">
         <img class="profile-picture" src="ChannelPicture/channel-2.jpeg">
      </div>
      <div class="video-info">
          <p class="video-title">
        Try Not To Laugh Challenge #9
        </p>
        <p class = "video-author">
         Markipiler
        </p>
        <p class="video-stats">
         19M views &#183; 4 years ago
    </p>
      </div>
      </div>
  </body>
</html>
