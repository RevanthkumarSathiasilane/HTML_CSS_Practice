<!DOCTYPE html>
<html>
  <head>
    <title>10d</title>
    <style>
      .cat{
        width:200px;
        height:260px;
        margin-bottom:0;
      }
      .Oliver{
        font-family:Roboto;
        font-weight:bold;
        font-size:18px;
        margin-top:10px;
        margin-bottom:0;
        margin-left:5px;
      }
      .grid-fish{
        display:grid;
        grid-template-columns:50px 1fr;
        width:250px;
      }
      .fish{
        margin-top:5px;
        border-radius:50px;
        width:40px;
        height:40px;
        margin-right:0;
      }
      .mutual{
        margin-right:20px;
        color:rgb(96,96,96);
        font-family:Roboto;
        font-size:14px;
        margin-top:20px;
      }
      .add-btn{
        border:none;
        cursor:pointer;
        background-color: blue;
        color:white;
        font-weight:bold;
        width:120px;
        height:37px;
        border-radius:4px;
      }
      .box{
        border-color:rgb(96,96,96);
        border-style:solid;
        width:195px;
        border:none;
        box-shadow:0 0 4px;
        margin-top:0;
        padding-bottom:4px;
        padding-left:5px;
      }
      .total-box{
        display:inline-block;
        box-shadow: 0 0 5px;
      }
      .cat-div{
        margin-bottom:0;
        height:250px;
      }
    </style>
  </head>
  <body>
    <div
    <div class="total-box">
      <div class="cat-div">
        <img class = "cat" src = "cat image.jfif">
      </div>
      <div class="box">
        <div>
          <p class="Oliver">Oliver</p>
        </div>
        <div class = "grid-fish">
          <div>
            <img class = "fish" src = "fish.jfif">
          </div>
          <div>
            <p class="mutual">2 mutual friends</p>
          </div>
        </div>
        <div>
           <button class="add-btn">Add Friend</button>
        </div>
      </div>
    </div>
  </body>
</html>
