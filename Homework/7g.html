<!DOCTYPE html>
<html>
  <head>
    <title>Twitter Text Box</title>
    <style>
      .circle-image{
        height:60px;
        width: 60px;
        border-radius:50px;
        object-fit:cover;
        object-position:right;
        vertical-align: middle;
        display:inline-block;
      }
      .text{
         margin-left:5px;
         vertical-align:middle;
         color:rgb(96,96,96);
         font-size:16px;
         font-family:Roboto;
         display:inline-block;
         margin-right:40px;
      }
      .tweet{
        vertical-align:middle;
        height:30px;
        width:85px;
        border-radius:14px;
        color:white;
        background-color: rgb(83, 83, 239);
        font-weight:bold;
        font-size:14px;
        border:none;
      }
    </style>
  </head>
  <body>
    <img class = "circle-image"src = "thumbnail-1.webp">
    <p class="text">What's happening</p>
    <button class="tweet">Tweet</button>
  </body>
</html>
